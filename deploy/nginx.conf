# App is only reachable through Tailscale Serve
# (https://pi-dthewind.tail89db5f.ts.net -> proxy to localhost:80),
# which injects trusted Tailscale-User-* identity headers and strips any
# client-supplied copies. Binding to 127.0.0.1 keeps the LAN out entirely.
server {
    listen 127.0.0.1:80;
    server_name _;

    root /home/dthewind/personal-dashboard/frontend/dist;
    index index.html;

    # Hashed assets are immutable — cache forever
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA fallback — all routes serve index.html, never cached
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Proxy API requests to uvicorn
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Legacy bookmark support: http://pi-dthewind redirects to the HTTPS front
# door. Bound to the Tailscale IPs only, so nothing is exposed on the LAN.
# Requires net.ipv4/ipv6.ip_nonlocal_bind=1 (set via /etc/sysctl.d/) so nginx
# can start before tailscaled has brought the interface up.
server {
    listen 100.87.116.106:80;
    listen [fd7a:115c:a1e0::d33a:746b]:80;
    return 301 https://pi-dthewind.tail89db5f.ts.net$request_uri;
}
